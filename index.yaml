indexes:

  # ── UserHistory ─────────────────────────────────────────────────────────────
  # get_user_history: filter by user_id, ORDER BY created_at DESC
  # Used by the ML recommendation engine (get_suggested_missions)
  - kind: UserHistory
    properties:
      - name: user_id
      - name: created_at
        direction: desc

  # get_history_entry: filter by user_id AND mission_id (two equality filters)
  # Used to check if a user already interacted with a specific mission
  - kind: UserHistory
    properties:
      - name: user_id
      - name: mission_id

  # ── ChatMessage ───────────────────────────────────────────────────────────────
  # list_chat_messages: filter by pod_id, ORDER BY created_at ASC
  # Used by GET /pods/<id>/messages
  - kind: ChatMessage
    properties:
      - name: pod_id
      - name: created_at

  # ── Signal (activity request) ─────────────────────────────────────────────────
  # list_signals_for_user: filter by creator_id, ORDER BY created_at DESC
  # Used by GET /api/signals
  - kind: Signal
    properties:
      - name: creator_id
      - name: created_at
        direction: desc

  # ── Mission (fixed-date activities) ────────────────────────────────────────────
  # list_missions with tag + status filter: used by GET /missions?tag=X
  - kind: Mission
    properties:
      - name: tags
      - name: status
