indexes:

  # ── UserEventHistory ─────────────────────────────────────────────────────────
  # get_user_event_history: filter by user_id, ORDER BY created_at DESC
  # Used by the ML recommendation engine (get_suggested_events)
  - kind: UserEventHistory
    properties:
      - name: user_id
      - name: created_at
        direction: desc

  # get_history_entry: filter by user_id AND event_id (two equality filters)
  # Used to check if a user already interacted with a specific event
  - kind: UserEventHistory
    properties:
      - name: user_id
      - name: event_id

  # ── ChatMessage ───────────────────────────────────────────────────────────────
  # list_chat_messages: filter by pod_id, ORDER BY created_at ASC
  # Used by GET /pods/<id>/messages
  - kind: ChatMessage
    properties:
      - name: pod_id
      - name: created_at

  # ── Mission (Signal / activity request) ──────────────────────────────────────
  # list_missions_for_user: filter by creator_id, ORDER BY created_at DESC
  # Used by GET /api/missions
  - kind: Mission
    properties:
      - name: creator_id
      - name: created_at
        direction: desc

  # ── Event ─────────────────────────────────────────────────────────────────────
  # list_events with tag + status filter: used by GET /events?tag=X
  - kind: Event
    properties:
      - name: tags
      - name: status
